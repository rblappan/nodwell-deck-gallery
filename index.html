<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoDwell Pitch Deck Gallery</title>
  <meta name="description" content="Central hub for all NoDwell pitch decks - personalized investor presentations, general decks, and branch variants.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-hover: #1a1a28;
      --border: rgba(139, 92, 246, 0.15);
      --border-hover: rgba(139, 92, 246, 0.4);
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.25);
      --green: #22c55e;
      --cyan: #06b6d4;
      --amber: #f59e0b;
      --red: #ef4444;
      --text: #e2e2ef;
      --text-muted: #8888a0;
      --text-dim: #55556a;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(139, 92, 246, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6, 182, 212, 0.06), transparent),
        radial-gradient(ellipse 40% 30% at 10% 60%, rgba(34, 197, 94, 0.04), transparent);
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--cyan) 50%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .header .subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .header .count-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.25);
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 500;
    }

    .count-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .filter-btn {
      padding: 0.45rem 1.1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .filter-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: var(--surface-hover);
    }

    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(139, 92, 246, 0.08);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .deck-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 1.25rem;
    }

    .deck-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      overflow: hidden;
      text-decoration: none;
      display: block;
    }

    .deck-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--cyan));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .deck-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 20px var(--accent-glow);
    }

    .deck-card:hover::before { opacity: 1; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .card-domain {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.65rem;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      background: rgba(6, 182, 212, 0.1);
      color: var(--cyan);
      border: 1px solid rgba(6, 182, 212, 0.2);
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 0.75rem;
    }

    .card-domain.custom {
      background: rgba(34, 197, 94, 0.1);
      color: var(--green);
      border-color: rgba(34, 197, 94, 0.2);
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-weight: 500;
    }

    .tag-category {
      background: rgba(139, 92, 246, 0.1);
      color: var(--accent);
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .tag-branch {
      background: rgba(245, 158, 11, 0.1);
      color: var(--amber);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .tag-main {
      background: rgba(34, 197, 94, 0.08);
      color: var(--green);
      border: 1px solid rgba(34, 197, 94, 0.15);
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-footer {
      margin-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-url {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: 'SF Mono', 'Fira Code', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 280px;
    }

    .open-arrow {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(139, 92, 246, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .deck-card:hover .open-arrow {
      background: var(--accent);
      color: white;
      transform: translateX(2px);
    }

    .repo-link {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 0.5rem;
      display: block;
    }

    .repo-link a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    .repo-link a:hover { color: var(--accent); }

    @media (max-width: 860px) {
      .deck-grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 2rem; }
      .container { padding: 2rem 1rem; }
    }

    .deck-card {
      animation: fadeSlideIn 0.4s ease forwards;
      opacity: 0;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

        repo: "rblappan/supplychainventuresdeck_detailed"
      }
    ];

    const grid = document.getElementById('deck-grid');
    const filterBar = document.getElementById('filter-bar');

    function renderCards(filter = 'all') {
      grid.innerHTML = '';
      const filtered = filter === 'all' ? decks : decks.filter(d => d.category === filter);
      
      document.getElementById('live-count').textContent = `${filtered.length} deck${filtered.length !== 1 ? 's' : ''} showing`;

      filtered.forEach((deck, i) => {
        const card = document.createElement('a');
        card.className = 'deck-card';
        card.href = deck.url;
        card.target = '_blank';
        card.rel = 'noopener';
        card.style.animationDelay = `${i * 0.04}s`;

        const branchTag = deck.branch !== 'main' 
          ? `<span class="tag tag-branch">\u24D1 ${deck.branch}</span>`
          : `<span class="tag tag-main">\u25CF main</span>`;

        const catLabels = {
          personalized: 'Personalized',
          general: 'General',
          branch: 'Branch Variant',
          other: 'Other'
        };

        const domainClass = deck.customDomain ? 'card-domain custom' : 'card-domain';

        card.innerHTML = `
          <div class="card-header">
            <span class="card-title">${deck.name}</span>
            <span class="${domainClass}">${deck.customDomain ? '\uD83C\uDF10 Custom' : 'Netlify'}</span>
          </div>
          <div class="card-meta">
            <span class="tag tag-category">${catLabels[deck.category]}</span>
            ${branchTag}
          </div>
          <p class="card-desc">${deck.desc}</p>
          <div class="card-footer">
            <span class="card-url">${deck.domain}</span>
            <div class="open-arrow">\u2192</div>
          </div>
          <span class="repo-link"><a href="https://github.com/${deck.repo}" target="_blank" rel="noopener">\u2937 ${deck.repo}</a></span>
        `;

        grid.appendChild(card);
      });
    }

    filterBar.addEventListener('click', e => {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      renderCards(e.target.dataset.filter);
    });

    renderCards();
  </script>
